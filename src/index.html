<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Magasin de Jeux</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google tag (gtag.js) – mettre une seule fois -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-35RSYRP4HD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-35RSYRP4HD');
  </script>

  <!-- CSS intégré -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background-color: #1e1e1e;
      font-size: 28px;
      font-weight: bold;
    }

    .games-container {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .game-card {
      background: #1f1f1f;
      border-radius: 12px;
      width: 260px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: transform 0.3s;
    }

    .game-card:hover {
      transform: scale(1.05);
    }

    .game-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .game-info {
      padding: 15px;
    }

    .game-title {
      font-size: 20px;
      margin: 10px 0;
    }

    .price {
      font-size: 18px;
      color: #00ff9d;
      margin-bottom: 10px;
    }

    .btn {
      background: #ff3c00;
      border: none;
      padding: 10px 15px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background: #ff5e2e;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .games-container {
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }

      .game-card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<header>
  🎮 Magasin de Jeux
</header>

<div class="games-container">
  <!-- FIFA 24 -->
  <div class="game-card">
    <img src="https://images.wallpapersden.com/image/download/ea-sports-fc-24-hd_bG1uaW2UmZqaraWkpJRmbmdlrWZlbWU.jpg" alt="FIFA 24">
    <div class="game-info">
      <div class="game-title">EA Sports FC 24</div>
      <div class="price">59€</div>
      <button class="btn">Voir détails</button>
    </div>
  </div>

  <!-- Call of Duty -->
  <div class="game-card">
    <img src="https://www.vhv.rs/dpng/d/423-4239793_call-of-duty-modern-warfare-cover-hd-png.png" alt="Call of Duty">
    <div class="game-info">
      <div class="game-title">Call of Duty</div>
      <div class="price">69€</div>
      <button class="btn">Voir détails</button>
    </div>
  </div>
</div>

<!-- Angular root -->
<app-root></app-root>

</body>
</html>
